<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Valentine 💖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Poppins",system-ui,sans-serif;
}

body{
  background:linear-gradient(135deg,#ffd6e8,#ffeaf3);
  color:#ff4f8b;
  overflow:hidden;
}

/* SCREENS */
.screen{
  position:absolute;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  padding:20px;
  animation:fadeIn 0.6s ease;
}
.screen.active{ display:flex; }

button{
  padding:12px 26px;
  border-radius:999px;
  border:none;
  background:#ff6fa5;
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-top:16px;
  box-shadow:0 10px 20px rgba(255,111,165,0.35);
  transition:.3s;
}
button:hover{ transform:scale(1.08); }

/* ENTRY */
#entry img{
  width:160px;
  cursor:pointer;
  animation:float 3s ease-in-out infinite;
}

/* FLIP CARD */
#photoPage{ overflow-y:auto; }

.flip-container{
  perspective:1000px;
  max-width:360px;
  width:100%;
}
.flip-card{
  width:100%;
  height:420px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .8s;
  cursor:pointer;
}
.flip-card.flipped{ transform:rotateY(180deg); }

.flip-side{
  position:absolute;
  inset:0;
  backface-visibility:hidden;
  background:rgba(255,255,255,0.65);
  backdrop-filter:blur(10px);
  border-radius:20px;
  box-shadow:0 15px 30px rgba(255,111,165,0.25);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
  text-align:center;
}
.flip-front img{
  width:100%;
  max-height:280px;
  object-fit:cover;
  border-radius:16px;
}
.flip-back{
  transform:rotateY(180deg);
  font-size:15px;
  line-height:1.6;
}
.letter-gif{
  width:120px;
  margin-bottom:12px;
  border-radius:12px;
}

/* FINAL PAGE */
#finalPage img{
  width:160px;
  border-radius:16px;
  margin:16px 0;
}

/* HEARTS */
.heart{
  position:absolute;
  bottom:-20px;
  font-size:18px;
  animation:rise 6s linear infinite;
  opacity:.8;
}

/* CONFETTI */
.confetti{
  position:absolute;
  top:-10px;
  font-size:18px;
  animation:fall 5s linear infinite;
}

/* ANIMATIONS */
@keyframes fadeIn{ from{opacity:0} to{opacity:1} }
@keyframes float{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
@keyframes rise{ 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(-110vh);opacity:0} }
@keyframes fall{ 0%{transform:translateY(0);opacity:1} 100%{transform:translateY(110vh);opacity:0} }
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="bgMusic" src="music.mp3" loop></audio>

<div id="hearts"></div>
<div id="confettiContainer"></div>

<!-- ENTRY -->
<section id="entry" class="screen active">
  <h1>I have something special for you 🎁</h1>
  <img src="flykiss.gif" onclick="openGift()">
</section>

<!-- INTRO -->
<section id="intro" class="screen">
  <h1>Happy anniversary dear 💕<br>I made this just for you</h1>
  <img src="gift.gif" width="140">
  <button onclick="startPhotos()">Next 💖</button>
  <h1></h1>
</section>

<!-- PHOTO PAGE -->
<section id="photoPage" class="screen">
  <div class="flip-container">
    <div class="flip-card" id="flipCard" onclick="flipCard()">
      <div class="flip-side flip-front">
        <img id="photoImg">
      </div>
      <div class="flip-side flip-back">
        <img id="letterGif" class="letter-gif">
        <p id="photoText"></p>
      </div>
    </div>
  </div>
  <button onclick="nextPhoto()">Next 💕</button>
</section>

<!-- FINAL PAGE -->
<section id="finalPage" class="screen">
  <h1>Happy anniversary dear 💕</h1>
  <img src="kisss.gif">
  <p id="typingText" style="font-size:18px;"></p>
  <button onclick="restart()">Start Again 💕</button>
</section>

<script>
const screens=document.querySelectorAll(".screen");
const music=document.getElementById("bgMusic");

const data=[
{ img:"1.jpeg", gif:"dudu-dudu-bubu.gif", text:"Happy Anniversary, my love. Every day with you feels like a beautiful dream I never want to wake up from." },
{ img:"2.jpeg", gif:"bubu-heart-sign-for-you-pd8aggu8cikgo4r8.gif", text:"You are not just my wife, you are my best friend, my peace, and my forever. I love you more with each passing year." },
{ img:"5.jpeg", gif:"bear-hug-kiss-bubu-dudu-pdyvjfqgohc9pk18.gif", text:"Our story might look simple from outside ✨,but for me, it’s everything 🌎❤️Every small fight 🥺💭, every laugh 😂💞, every late-night talk 🌙📞 —it all built something beautiful between us 🫶🌸And I wouldn’t change a single chapter 📖💖" },
{ img:"3.jpeg", gif:"bubu-bubu-dudu.gif", text:"I don’t promise a perfect life 🌧️🌤️I promise to stand beside you through everything 🤝❤️I promise to respect you 💎to support your dreams ✨🌙and to love you in ways that make you feel secure 🫂🔐and truly valued 👑🤍 — always" },
{ img:"4.jpeg", gif:"hugi.gif", text:"I don’t just love you on special days 🎉💖I love you on normal days 🌤️, boring days 😌, tired days 😔, and silent days 🤫🤍My love for you isn’t loud 🔊❌ —it’s constant ♾️❤️, steady 🤝, and always there for you 🫶✨" },
{ img:"6.jpeg", gif:"9c7e6f79e171791645189e460bbb36f1.gif", text:"If you ever feel insecure 😔💭, confused 🤍❓, or not enough 🥺 —come back to this page and read this 📖✨:You are more than enough for me 💎❤️.I choose you 🤝💖 —not once, not twice…but every single day ♾️🌅🤍." }
];

let index=0;
const flipCardEl=document.getElementById("flipCard");

function goTo(id){
screens.forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function openGift(){
music.play();
goTo("intro");
}

function startPhotos(){
index=0;
showCard();
goTo("photoPage");
}

function showCard(){
flipCardEl.classList.remove("flipped");
photoImg.src=data[index].img;
letterGif.src=data[index].gif;
photoText.innerText=data[index].text;
}

function flipCard(){ flipCardEl.classList.toggle("flipped"); }

function nextPhoto(){
index++;
if(index<data.length){
showCard();
}else{
goTo("finalPage");
startConfetti();
startTyping();
}
}

function restart(){ location.reload(); }

/* HEARTS */
setInterval(()=>{
const heart=document.createElement("div");
heart.className="heart";
heart.innerText="💗";
heart.style.left=Math.random()*100+"vw";
document.getElementById("hearts").appendChild(heart);
setTimeout(()=>heart.remove(),7000);
},500);

/* CONFETTI */
function startConfetti(){
setInterval(()=>{
const c=document.createElement("div");
c.className="confetti";
c.innerText="🎊";
c.style.left=Math.random()*100+"vw";
document.getElementById("confettiContainer").appendChild(c);
setTimeout(()=>c.remove(),5000);
},300);
}

/* TYPING */
function startTyping(){
const text = [
"After every smile"
"every memory"
"and every moment we’ve shared… "
"I still fall in love with you all over again."
"Happy Anniversary, my forever"
];

let lineIndex = 0;
let charIndex = 0;
const typingText = document.getElementById("typingText");

const typing = setInterval(()=>{
  if(lineIndex < text.length){
    if(charIndex < text[lineIndex].length){
      typingText.innerHTML += text[lineIndex].charAt(charIndex);
      charIndex++;
    } else {
      typingText.innerHTML += "<br><br>";
      lineIndex++;
      charIndex = 0;
    }
  } else {
    clearInterval(typing);
  }
}, 40);
}

</script>

</body>
</html>
